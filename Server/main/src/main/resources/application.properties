spring.application.name=flowstock
spring.profiles.default=local

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/flowstock}
spring.datasource.username=${DB_USERNAME:flowstock}
spring.datasource.password=${DB_PASSWORD:flowstock}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

spring.jackson.time-zone=Asia/Seoul
spring.mvc.problemdetails.enabled=true

mybatis.mapper-locations=classpath:/mapper/**/*.xml
mybatis.type-aliases-package=com.flowstock
mybatis.configuration.map-underscore-to-camel-case=true

server.port=${SERVER_PORT:8080}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

jwt.secret=${JWT_SECRET:change-me-in-local-and-prod}
jwt.access-token-expiration-seconds=${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}
jwt.refresh-token-expiration-seconds=${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}
